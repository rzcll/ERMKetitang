<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>E-RM KETITANG MEDIKA</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    
    body { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); background-attachment: fixed; color: #333; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    .glass { background: rgba(255, 255, 255, 0.55); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.7); border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1); }
    
    .navbar { display: flex; justify-content: space-between; gap: 10px; padding: 10px; margin: 15px auto 25px auto; width: 92%; max-width: 450px; border-radius: 50px; position: sticky; top: 15px; z-index: 100; background: rgba(255, 255, 255, 0.45); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 10px 25px rgba(13, 148, 136, 0.2); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
    .nav-btn { flex: 1; padding: 14px 10px; border: none; border-radius: 40px; font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; transition: 0.3s; color: #4a5568; background: transparent; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .nav-btn:hover:not(.active) { background: rgba(255,255,255,0.7); } 
    .nav-erm.active { background: #0d9488; color: #fff; box-shadow: 0 4px 15px rgba(13, 148, 136, 0.4); } .nav-pendapatan.active { background: #e11d48; color: #fff; box-shadow: 0 4px 15px rgba(225, 29, 72, 0.4); }

    .container { padding: 0 20px 40px 20px; max-width: 1400px; margin: 0 auto; width: 100%; }
    .page { display: none; animation: fadeIn 0.3s ease-out; } .page.active { display: block; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .welcome-banner { padding: 15px 25px; text-align: center; margin: 0 auto 25px auto; max-width: 600px; background: rgba(255, 255, 255, 0.45); border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); box-shadow: 0 8px 25px rgba(13, 148, 136, 0.15); }
    .welcome-banner h1 { color: #0f766e; font-size: 20px; font-weight: 800; margin-bottom: 2px; } .welcome-banner p { color: #4a5568; font-size: 13px; font-weight: 600; margin: 0; } .welcome-banner.pendapatan-banner h1 { color: #be123c; margin-bottom: 0; display: flex; align-items: center; justify-content: center; gap: 10px; }

    .action-bar { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; }
    .search-box { flex: 1; padding: 15px 25px; font-size: 14px; border: none; border-radius: 30px; outline: none; background: rgba(255, 255, 255, 0.8); min-width: 250px; max-width: 600px; transition: 0.3s; }
    .search-box:focus { background: #fff; box-shadow: 0 4px 15px rgba(255,255,255,0.8); }
    .btn-super { background: linear-gradient(135deg, #0d9488 0%, #14b8a6 100%); color: white; border: none; border-radius: 30px; padding: 0 30px; height: 50px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }
    .btn-super:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(13, 148, 136, 0.4); }

    #patientList { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
    .patient-card { padding: 20px; margin-bottom: 0; display: flex; flex-direction: column; justify-content: space-between; align-items: flex-start; transition: 0.3s; height: 100%; }
    .patient-card:hover { transform: translateY(-3px) scale(1.01); background: rgba(255, 255, 255, 0.9); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .patient-info { width: 100%; margin-bottom: 15px; } .patient-info h3 { margin-bottom: 5px; font-size: 16px; color: #0f766e; font-weight: 800; display: flex; align-items: center; gap: 8px;} .patient-info p { font-size: 13px; color: #4a5568; margin:0; line-height: 1.4;}
    
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; width: 100%; justify-content: flex-end;}
    .btn { padding: 8px 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 12px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 6px;}
    .btn-mulai { background: #14b8a6; color: white; flex: 1;} .btn-riwayat { background: #f59e0b; color: white; flex: 1;} .btn-edit { background: #fef08a; color: #b45309; } .btn-batal { background: #cbd5e0; color: #4a5568; }
    .btn:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.15);}

    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-card { padding: 12px 5px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; background: rgba(255,255,255,0.6); border-radius: 18px; border: 1px solid rgba(255,255,255,0.9); position: relative; overflow: hidden; user-select: none;}
    .stat-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 10px 20px rgba(225, 29, 72, 0.2); background: linear-gradient(135deg, #fb7185 0%, #e11d48 100%); border-color: #be123c; }
    
    .card-nav { display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 5px; padding: 0 5px;}
    .btn-arrow { background: transparent; border: none; color: #0f766e; cursor: pointer; font-size: 14px; padding: 5px; transition: 0.2s; border-radius: 5px;}
    .btn-arrow:hover { background: rgba(255,255,255,0.5); transform: scale(1.2); }
    
    .stat-card h4 { font-size: 10px; color: #be123c; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.3s; flex:1; cursor: pointer;}
    .stat-card h2 { font-size: 18px; color: #2d3748; font-weight: 800; transition: 0.3s; cursor: pointer; padding: 5px; width: 100%;}
    .stat-card:hover h4, .stat-card:hover h2, .stat-card:hover .btn-arrow { color: #ffffff; }

    .calendar-container { background: rgba(255, 255, 255, 0.65); border-radius: 20px; padding: 20px; border: 1px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; } .calendar-header h3 { color: #0f766e; font-size: 16px; font-weight: 800; margin: 0; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 8px; text-align: center; } .cal-day-name { font-weight: 800; color: #be123c; font-size: 13px; padding-bottom: 8px; border-bottom: 2px solid rgba(255,255,255,0.5); margin-bottom: 4px;}
    
    .cal-day { position: relative; background: rgba(255, 255, 255, 0.5); padding: 10px 4px 6px 4px; border-radius: 12px; min-height: 75px; display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(255,255,255,0.7); transition: 0.3s; }
    .cal-day.has-data { cursor: pointer; background: #fff; border-color: #14b8a6; box-shadow: 0 4px 10px rgba(20, 184, 166, 0.15);} .cal-day.has-data:hover { transform: translateY(-3px) scale(1.02); z-index: 10;}
    .cal-day.empty { background: transparent; border: none; box-shadow: none;} .cal-day.today { border: 2px solid #e11d48; background: rgba(225, 29, 72, 0.05); } .cal-day .date-num { font-weight: 800; color: #0f766e; font-size: 14px; margin-bottom: 4px; }
    
    .logo-rp-emas { position: absolute; top: 4px; right: 5px; color: #f59e0b; font-size: 11px; font-weight: 900; animation: pulseGlow 1.2s infinite alternate; } @keyframes pulseGlow { 0% { transform: scale(0.9); text-shadow: 0 0 5px rgba(245, 158, 11, 0.5); } 100% { transform: scale(1.2); text-shadow: 0 0 10px rgba(245, 158, 11, 1); } }
    .visit-badge { font-size: 9px; font-weight: 700; color: #fff; background: #14b8a6; padding: 2px 6px; border-radius: 10px; margin-bottom: 2px; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
    .text-red { color: #e11d48 !important; } .holiday-tag { font-size: 9px; font-weight: 800; color: #e11d48; background: rgba(225, 29, 72, 0.1); padding: 2px 4px; border-radius: 4px; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px;} .cal-day .income-tag { font-size: 10px; font-weight: 800; color: #be123c; background: rgba(225, 29, 72, 0.1); padding: 2px 4px; border-radius: 4px; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { width: 95%; max-width: 650px; padding: 25px; max-height: 90vh; overflow-y: auto; background: rgba(255, 255, 255, 0.95); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
    .modal-header { font-size: 18px; font-weight: 800; color: #0f766e; margin-bottom: 20px; border-bottom: 2px solid rgba(13, 148, 136, 0.1); padding-bottom: 10px;}
    .form-group { margin-bottom: 12px; } .form-group label { display: block; margin-bottom: 5px; font-weight: 700; font-size: 13px; color: #4a5568;} .form-control { width: 100%; padding: 12px; border: 1px solid rgba(0,0,0,0.1); border-radius: 10px; outline: none; transition: 0.3s; font-size: 14px; background: rgba(255,255,255,0.7); } .form-control:focus { background:#fff; border-color:#14b8a6; box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.2);}
    
    @media screen and (max-width: 768px) {
      .navbar { position: fixed; bottom: 0; top: auto; width: 100%; border-radius: 24px 24px 0 0; margin: 0; left: 0; max-width: 100%; box-shadow: 0 -5px 25px rgba(72, 187, 120, 0.2); border: none; border-top: 1px solid rgba(255,255,255,0.6); }
      .container { padding: 10px 10px 100px 10px; } .dashboard-grid { grid-template-columns: repeat(2, 1fr); } #patientList { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="navbar">
    <button class="nav-btn nav-erm active" onclick="switchTab('erm')"><i class="fas fa-stethoscope"></i> E-RM</button>
    <button class="nav-btn nav-pendapatan" onclick="switchTab('pendapatan')"><i class="fas fa-wallet"></i> REKAP</button>
  </div>

  <div class="container">
    <div id="erm" class="page active">
      <div class="welcome-banner"><h1><i class="fas fa-hospital"></i> E-RM KETITANG MEDIKA</h1><p>Pencatatan Rekam Medis Segar & Cepat.</p></div>
      <div class="action-bar">
        <input type="text" id="searchInput" class="search-box glass" placeholder="🔍 Cari Nama / Alamat Pasien..." onkeyup="filterPasien()">
        <button class="btn-super" onclick="bukaModal('modalTambah')"><i class="fas fa-user-plus"></i> Pasien Baru</button>
      </div>
      <div id="loaderData" style="text-align:center; padding:20px; display:none;"><i class="fas fa-spinner fa-spin" style="font-size:30px; color:#0f766e"></i></div>
      <div id="patientList"></div>
    </div>

    <div id="pendapatan" class="page">
      <div class="welcome-banner pendapatan-banner"><h1><i class="fas fa-chart-line"></i> REKAPITULASI PENDAPATAN</h1></div>
      <div style="text-align: right; margin-bottom: 15px;">
        <button class="btn btn-mulai" style="background:#2f855a; display:inline-flex;" onclick="loadPendapatanManual()"><i class="fas fa-sync-alt"></i> Refresh Data</button>
      </div>
      <div id="loaderPendapatan" style="text-align:center; padding:20px; display:none;"><i class="fas fa-spinner fa-spin" style="font-size:30px; color:#e11d48"></i></div>
      <div id="kontenPendapatan" style="display:none;">
        
        <div class="dashboard-grid">
          <div class="stat-card" id="swipeHari">
            <div class="card-nav">
              <button class="btn-arrow" onclick="ubahOffset('hari', -1, event)"><i class="fas fa-chevron-left"></i></button>
              <h4 id="labelHari" onclick="bukaDetail('hari')">Hari Ini</h4>
              <button class="btn-arrow" onclick="ubahOffset('hari', 1, event)"><i class="fas fa-chevron-right"></i></button>
            </div>
            <h2 id="pdptHari" onclick="bukaDetail('hari')">Rp 0</h2>
          </div>
          
          <div class="stat-card" id="swipeMinggu">
            <div class="card-nav">
              <button class="btn-arrow" onclick="ubahOffset('minggu', -1, event)"><i class="fas fa-chevron-left"></i></button>
              <h4 id="labelMinggu" onclick="bukaDetail('minggu')">Minggu Ini</h4>
              <button class="btn-arrow" onclick="ubahOffset('minggu', 1, event)"><i class="fas fa-chevron-right"></i></button>
            </div>
            <h2 id="pdptMinggu" onclick="bukaDetail('minggu')">Rp 0</h2>
          </div>

          <div class="stat-card" id="swipeBulan">
            <div class="card-nav">
              <button class="btn-arrow" onclick="ubahOffset('bulan', -1, event)"><i class="fas fa-chevron-left"></i></button>
              <h4 id="labelBulan" onclick="bukaDetail('bulan')">Bulan Ini</h4>
              <button class="btn-arrow" onclick="ubahOffset('bulan', 1, event)"><i class="fas fa-chevron-right"></i></button>
            </div>
            <h2 id="pdptBulan" onclick="bukaDetail('bulan')">Rp 0</h2>
          </div>

          <div class="stat-card" id="swipeTahun">
            <div class="card-nav">
              <button class="btn-arrow" onclick="ubahOffset('tahun', -1, event)"><i class="fas fa-chevron-left"></i></button>
              <h4 id="labelTahun" onclick="bukaDetail('tahun')">Tahun Ini</h4>
              <button class="btn-arrow" onclick="ubahOffset('tahun', 1, event)"><i class="fas fa-chevron-right"></i></button>
            </div>
            <h2 id="pdptTahun" onclick="bukaDetail('tahun')">Rp 0</h2>
          </div>
        </div>
        
        <div class="calendar-container glass">
          <div class="calendar-header">
              <button class="btn btn-batal" onclick="ubahBulanKalender(-1)" style="padding:5px 12px"><i class="fas fa-chevron-left"></i></button>
              <h3 id="judulBulanKalender">Memuat...</h3>
              <button class="btn btn-batal" onclick="ubahBulanKalender(1)" style="padding:5px 12px"><i class="fas fa-chevron-right"></i></button>
          </div>
          <div id="gridKalender" class="calendar-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="modalTambah" class="modal-overlay">
    <div class="modal-content glass">
      <div class="modal-header"><i class="fas fa-user-plus"></i> Input Pasien Baru</div>
      <form id="formTambahPasien" onsubmit="submitTambahPasien(event)">
        <div class="form-group">
          <label>Sapaan Gelar</label>
          <div class="radio-group">
            <label><input type="radio" name="titlePasien" value="Tn. " checked> Tn.</label>
            <label><input type="radio" name="titlePasien" value="Ny. "> Ny.</label>
            <label><input type="radio" name="titlePasien" value="An. "> An.</label>
            <label><input type="radio" name="titlePasien" value="Nn. "> Nn.</label>
          </div>
        </div>
        <div class="form-group"><label>Nama Lengkap</label><input type="text" id="newNama" class="form-control" required placeholder="Nama Pasien"></div>
        <div class="form-group"><label>Alamat Rumah</label><textarea id="newAlamat" class="form-control" rows="2" required placeholder="Desa, Jalan, dsb..."></textarea></div>
        <div class="grid-2">
          <div class="form-group"><label>RT</label><input type="number" id="newRT" class="form-control" required></div>
          <div class="form-group"><label>RW</label><input type="number" id="newRW" class="form-control" required></div>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
          <button type="button" class="btn btn-batal" onclick="tutupModal('modalTambah')">Batal</button>
          <button type="submit" class="btn btn-super" id="btnSavePasien"><i class="fas fa-save"></i> Simpan & Periksa</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modalEditPasien" class="modal-overlay">
    <div class="modal-content glass">
      <div class="modal-header"><i class="fas fa-user-edit"></i> Edit Biodata Pasien</div>
      <form id="formEditPasien" onsubmit="submitEditPasien(event)">
        <input type="hidden" id="editIdPasien">
        <div class="form-group">
          <div class="radio-group">
            <label><input type="radio" name="editTitlePasien" value="Tn. "> Tn.</label>
            <label><input type="radio" name="editTitlePasien" value="Ny. "> Ny.</label>
            <label><input type="radio" name="editTitlePasien" value="An. "> An.</label>
            <label><input type="radio" name="editTitlePasien" value="Nn. "> Nn.</label>
          </div>
        </div>
        <div class="form-group"><label>Nama Pasien</label><input type="text" id="editNama" class="form-control" required></div>
        <div class="form-group"><label>Alamat</label><textarea id="editAlamat" class="form-control" rows="2" required></textarea></div>
        <div class="grid-2">
          <div class="form-group"><label>RT</label><input type="number" id="editRT" class="form-control" required></div>
          <div class="form-group"><label>RW</label><input type="number" id="editRW" class="form-control" required></div>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
          <button type="button" class="btn btn-batal" onclick="tutupModal('modalEditPasien')">Batal</button>
          <button type="submit" class="btn btn-super" id="btnUpdatePasien">Update Biodata</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modalForm" class="modal-overlay">
    <div class="modal-content glass">
      <div class="modal-header"><i class="fas fa-stethoscope"></i> Pemeriksaan: <span id="namaPasienDisp" style="color:#0d9488"></span></div>
      <form id="formPemeriksaan" onsubmit="submitPemeriksaan(event)">
        <input type="hidden" id="idPasien">
        <div class="form-group"><label>Anamnesa / Keluhan</label><textarea id="anamnesa" class="form-control" rows="2" required placeholder="Keluhan Pasien..."></textarea></div>
        <div class="vitals-grid">
          <div class="form-group"><label>Tensi (TD)</label><input type="text" id="td" class="form-control input-vitals" placeholder="120/80"></div>
          <div class="form-group"><label>Suhu (°C)</label><input type="text" id="suhu" class="form-control input-vitals"></div>
          <div class="form-group"><label>Nadi</label><input type="text" id="nadi" class="form-control input-vitals"></div>
          <div class="form-group"><label>RR</label><input type="text" id="rr" class="form-control input-vitals"></div>
        </div>
        <div style="background: rgba(255,255,255,0.6); padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 10px;">
          <label style="font-weight:700; color:#2d3748; margin-bottom:8px; display:block;"><i class="fas fa-capsules"></i> Resep Obat (6 Baris)</label>
          <input type="text" id="obat1" class="form-control" style="margin-bottom:6px" placeholder="Obat 1">
          <input type="text" id="obat2" class="form-control" style="margin-bottom:6px" placeholder="Obat 2">
          <input type="text" id="obat3" class="form-control" style="margin-bottom:6px" placeholder="Obat 3">
          <input type="text" id="obat4" class="form-control" style="margin-bottom:6px" placeholder="Obat 4">
          <input type="text" id="obat5" class="form-control" style="margin-bottom:6px" placeholder="Obat 5">
          <input type="text" id="obat6" class="form-control" placeholder="Obat 6">
        </div>
        <div class="form-group" style="margin-top:10px;"><label>Total Biaya (Rp)</label><input type="text" id="biaya" class="form-control input-biaya" required oninput="formatRibuan(this)"></div>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
          <button type="button" class="btn btn-batal" onclick="tutupModal('modalForm')">Batal</button>
          <button type="submit" class="btn btn-mulai" id="btnSimpanRM">Simpan Data RM</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modalEditRM" class="modal-overlay">
    <div class="modal-content glass">
      <div class="modal-header"><i class="fas fa-edit"></i> Edit Hasil Pemeriksaan</div>
      <form id="formEditRM" onsubmit="submitEditRM(event)">
        <input type="hidden" id="editRMRowIndex">
        <div class="form-group"><label>Anamnesa / Keluhan</label><textarea id="editAnamnesa" class="form-control" rows="2" required></textarea></div>
        <div class="vitals-grid">
          <div class="form-group"><label>Tensi</label><input type="text" id="editTd" class="form-control"></div>
          <div class="form-group"><label>Suhu</label><input type="text" id="editSuhu" class="form-control"></div>
          <div class="form-group"><label>Nadi</label><input type="text" id="editNadi" class="form-control"></div>
          <div class="form-group"><label>RR</label><input type="text" id="editRr" class="form-control"></div>
        </div>
        <div style="background: rgba(255,255,255,0.6); padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 10px;">
          <input type="text" id="editObat1" class="form-control" style="margin-bottom:6px">
          <input type="text" id="editObat2" class="form-control" style="margin-bottom:6px">
          <input type="text" id="editObat3" class="form-control" style="margin-bottom:6px">
          <input type="text" id="editObat4" class="form-control" style="margin-bottom:6px">
          <input type="text" id="editObat5" class="form-control" style="margin-bottom:6px">
          <input type="text" id="editObat6" class="form-control">
        </div>
        <div class="form-group" style="margin-top:10px;"><label>Total Biaya</label><input type="text" id="editBiaya" class="form-control input-biaya" required oninput="formatRibuan(this)"></div>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
          <button type="button" class="btn btn-batal" onclick="tutupModal('modalEditRM')">Batal</button>
          <button type="submit" class="btn btn-super" id="btnUpdateRM">Update RM</button>
        </div>
      </form>
    </div>
  </div>
