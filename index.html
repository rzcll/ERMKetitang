<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>E-RM KETITANG MEDIKA</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    
    /* TEMA KACA ORIGINAL (Ungu/Pink) */
    body { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); background-attachment: fixed; color: #333; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    .glass { background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1); }
    
    .navbar { display: flex; justify-content: space-between; gap: 10px; padding: 10px; margin: 15px auto 25px auto; width: 92%; max-width: 450px; border-radius: 50px; position: sticky; top: 15px; z-index: 100; background: rgba(255, 255, 255, 0.35); border: 1px solid rgba(255, 255, 255, 0.7); box-shadow: 0 10px 25px rgba(72, 187, 120, 0.3); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); animation: floatMenu 4s ease-in-out infinite; }
    @keyframes floatMenu { 0% { transform: translateY(0px); box-shadow: 0 10px 25px rgba(72, 187, 120, 0.3); } 50% { transform: translateY(-8px); box-shadow: 0 20px 30px rgba(72, 187, 120, 0.15); } 100% { transform: translateY(0px); box-shadow: 0 10px 25px rgba(72, 187, 120, 0.3); } }
    .nav-btn { flex: 1; padding: 14px 10px; border: none; border-radius: 40px; font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: #4a5568; background: transparent; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .nav-btn:hover:not(.active) { background: rgba(255,255,255,0.6); color: #2d3748; } .nav-erm.active { background: #2b6cb0; color: #fff; box-shadow: 0 4px 15px rgba(43, 108, 176, 0.35); } .nav-pendapatan.active { background: #2f855a; color: #fff; box-shadow: 0 4px 15px rgba(47, 133, 90, 0.35); }

    .container { padding: 0 20px 40px 20px; max-width: 1400px; margin: 0 auto; width: 100%; }
    .page { display: none; animation: fadeIn 0.3s ease-out; } .page.active { display: block; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .welcome-banner { padding: 15px 25px; text-align: center; margin: 0 auto 25px auto; max-width: 600px; background: rgba(255, 255, 255, 0.35); border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); box-shadow: 0 8px 25px rgba(72, 187, 120, 0.25); animation: floatBanner 4s ease-in-out infinite; }
    @keyframes floatBanner { 0% { transform: translateY(0px); box-shadow: 0 8px 25px rgba(72, 187, 120, 0.25); } 50% { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(72, 187, 120, 0.15); } 100% { transform: translateY(0px); box-shadow: 0 8px 25px rgba(72, 187, 120, 0.25); } }
    .welcome-banner h1 { color: #2b6cb0; font-size: 20px; margin-bottom: 2px; font-weight: 800; letter-spacing: 0.5px; } .welcome-banner p { color: #4a5568; font-size: 13px; font-weight: 600; margin: 0; } .welcome-banner.pendapatan-banner h1 { color: #2f855a; margin-bottom: 0; display: flex; align-items: center; justify-content: center; gap: 10px; }

    .action-bar { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; }
    .search-box { flex: 1; padding: 15px 25px; font-size: 14px; border: none; border-radius: 30px; outline: none; background: rgba(255, 255, 255, 0.7); min-width: 250px; max-width: 600px; transition: 0.3s; }
    .search-box:focus { background: #fff; box-shadow: 0 4px 15px rgba(255,255,255,0.8); }
    .btn-super { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 30px; padding: 0 30px; height: 50px; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s ease; white-space: nowrap; }
    .btn-super:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); }

    #patientList { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
    .patient-card { padding: 20px; margin-bottom: 0; display: flex; flex-direction: column; justify-content: space-between; align-items: flex-start; transition: 0.3s; height: 100%; }
    .patient-card:hover { transform: translateY(-3px) scale(1.01); background: rgba(255, 255, 255, 0.8); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .patient-info { width: 100%; margin-bottom: 15px; } .patient-info h3 { margin-bottom: 5px; font-size: 16px; color: #2d3748; font-weight: 600; display: flex; align-items: center; gap: 8px;} .patient-info p { font-size: 13px; color: #4a5568; margin:0; line-height: 1.4;}
    
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; width: 100%; justify-content: flex-end;}
    .btn { padding: 8px 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 12px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 6px;}
    .btn-mulai { background: #48bb78; color: white; flex: 1;} .btn-riwayat { background: #ed8936; color: white; flex: 1;} .btn-edit { background: #ecc94b; color: #744210; } .btn-batal { background: #cbd5e0; color: #4a5568; }
    .btn:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.15);}

    /* FITUR MESIN WAKTU (GESER) PADA KARTU REKAP */
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-card { padding: 12px 5px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; background: rgba(255,255,255,0.6); border-radius: 15px; border: 1px solid rgba(255,255,255,0.9); user-select: none;}
    .stat-card:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 10px 20px rgba(237, 137, 54, 0.35); background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%); border-color: #dd6b20; }
    
    .card-nav { display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 2px; padding: 0 5px;}
    .btn-arrow { background: transparent; border: none; color: #4a5568; cursor: pointer; font-size: 14px; padding: 5px; transition: 0.2s; border-radius: 5px;}
    .btn-arrow:hover { background: rgba(255,255,255,0.5); transform: scale(1.2); }
    
    .stat-card h4 { font-size: 10px; color: #718096; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; transition: color 0.3s; flex: 1;}
    .stat-card h2 { font-size: 18px; color: #2d3748; font-weight: 800; transition: color 0.3s; padding: 5px; width: 100%; }
    .stat-card:hover h4, .stat-card:hover h2, .stat-card:hover .btn-arrow { color: #ffffff; }

    /* KALENDER */
    .calendar-container { background: rgba(255, 255, 255, 0.7); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,1); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; } .calendar-header h3 { color: #2b6cb0; font-size: 16px; font-weight: 700; margin: 0; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 8px; text-align: center; } .cal-day-name { font-weight: 700; color: #4a5568; font-size: 13px; padding-bottom: 8px; border-bottom: 2px solid rgba(0,0,0,0.05); margin-bottom: 4px;}
    
    .cal-day { position: relative; background: rgba(255, 255, 255, 0.5); padding: 10px 4px 6px 4px; border-radius: 12px; min-height: 75px; display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(0,0,0,0.03); transition: 0.3s; }
    .cal-day.has-data { cursor: pointer; } .cal-day.has-data:hover { background: #fff; border-color: #3182ce; transform: translateY(-3px) scale(1.02); box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 10;}
    .cal-day.empty { background: transparent; border: none; box-shadow: none;} .cal-day.today { border: 2px solid #48bb78; background: rgba(72, 187, 120, 0.05); } .cal-day .date-num { font-weight: 700; color: #2d3748; font-size: 14px; margin-bottom: 4px; }
    
    .logo-rp-emas { position: absolute; top: 4px; right: 5px; color: #ffd700; font-size: 11px; font-weight: 900; letter-spacing: 0.5px; animation: pulseGlow 1.2s infinite alternate; } @keyframes pulseGlow { 0% { transform: scale(0.9); text-shadow: 0 0 5px rgba(255, 215, 0, 0.5); opacity: 0.8; } 100% { transform: scale(1.3); text-shadow: 0 0 10px rgba(255, 215, 0, 1), 0 0 20px rgba(255, 140, 0, 0.8); opacity: 1; } }
    .visit-badge { font-size: 9px; font-weight: 700; color: #fff; background: #3182ce; padding: 2px 6px; border-radius: 10px; margin-bottom: 2px; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
    .text-red { color: #e53e3e !important; } .holiday-tag { font-size: 9px; font-weight: 700; color: #e53e3e; background: rgba(229, 62, 62, 0.1); padding: 2px 4px; border-radius: 4px; width: 100%; word-break: break-word; line-height: 1.1; margin-bottom: 3px;} .cal-day .income-tag { font-size: 10px; font-weight: 700; color: #2f855a; background: rgba(47, 133, 90, 0.15); padding: 2px 4px; border-radius: 4px; width: 100%; word-break: break-word; line-height: 1.1;}

    /* MODALS */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { width: 95%; max-width: 650px; padding: 25px; max-height: 90vh; overflow-y: auto; background: rgba(255, 255, 255, 0.95); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
    .modal-header { font-size: 18px; font-weight: 600; color: #2d3748; margin-bottom: 20px; border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 10px;}
    .form-group { margin-bottom: 12px; } .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; color: #4a5568;} .form-control { width: 100%; padding: 12px; border: 1px solid rgba(0,0,0,0.1); border-radius: 10px; outline: none; transition: 0.3s; font-size: 14px; background: rgba(255,255,255,0.7); } .form-control:focus { background:#fff; border-color:#b794f4; box-shadow: 0 0 0 3px rgba(183, 148, 244, 0.2);}
    
    .radio-group { display: flex; gap: 15px; margin-top: 8px; flex-wrap: wrap; background: rgba(255,255,255,0.5); padding: 8px 12px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.05); } .radio-group label { display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 13px; color: #4a5568; cursor: pointer; margin:0;}
    
    @media screen and (max-width: 768px) {
      .navbar { position: fixed; bottom: 0; top: auto; width: 100%; border-radius: 24px 24px 0 0; margin: 0; left: 0; max-width: 100%; box-shadow: 0 -5px 25px rgba(72, 187, 120, 0.2); border: none; border-top: 1px solid rgba(255,255,255,0.6); }
      .container { padding: 10px 10px 100px 10px; }
      .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
      #patientList { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="navbar">
    <button class="nav-btn nav-erm active" onclick="switchTab('erm')"><i class="fas fa-notes-medical" style="font-size: 18px;"></i> E-RM</button>
    <button class="nav-btn nav-pendapatan" onclick="switchTab('pendapatan')"><i class="fas fa-wallet" style="font-size: 18px;"></i> REKAP</button>
  </div>

  <div class="container">
    <div id="erm" class="page active">
      <div class="welcome-banner">
        <h1><i class="fas fa-hospital"></i> E-RM KETITANG MEDIKA</h1>
        <p>Form pencatatan rekam medis pengobatan pasien secara digital.</p>
      </div>
      <div class="action-bar">
        <input type="text" id="searchInput" class="search-box glass" placeholder="🔍 Cari Nama / Alamat Pasien..." onkeyup="filterPasien()">
        <button class="btn-super" onclick="bukaModal('modalTambah')"><i class="fas fa-user-plus"></i> Pasien Baru</button>
      </div>
      <div id="loaderData" style="text-align:center; padding:20px; display:none;"><i class="fas fa-spinner fa-spin" style="font-size:30px; color:#2b6cb0"></i></div>
      <div id="patientList"></div>
    </div>

    <div id="pendapatan" class="page">
      <div class="welcome-banner pendapatan-banner"><h1><i class="fas fa-chart-line"></i> Rekap Pendapatan</h1></div>
      <div style="text-align: right; margin-bottom: 15px;">
        <button class="btn btn-mulai" style="background:#2f855a; display:inline-flex;" onclick="loadPendapatanManual()"><i class="fas fa-sync-alt"></i> Refresh Data</button>
      </div>
      
      <div id="loaderPendapatan" style="text-align:center; padding:20px; display:none;"><i class="fas fa-spinner fa-spin" style="font-size:30px; color:#2f855a"></i></div>
      
      <div id="kontenPendapatan" style="display:none;">
        <div class="dashboard-grid glass">
          <div class="stat-card" id="swipeHari">
            <div class="card-nav">
              <button class="btn-arrow" onclick="ubahOffset('hari', -1, event)"><i class="fas fa-chevron-left"></i></button>
              <h4 id="labelHari" onclick="bukaDetailPeriode('hari')">Hari Ini</h4>
              <button class="btn-arrow" onclick="ubahOffset('hari', 1, event)"><i class="fas fa-chevron-right"></i></button>
            </div>
            <h2 id="pdptHari" onclick="bukaDetailPeriode('hari')">Rp 0</h2>
          </div>
          
          <div class="stat-card" id="swipeMinggu">
            <div class="card-nav">
              <button class="btn-arrow" onclick="ubahOffset('minggu', -1, event)"><i class="fas fa-chevron-left"></i></button>
              <h4 id="labelMinggu" onclick="bukaDetailPeriode('minggu')">Minggu Ini</h4>
              <button class="btn-arrow" onclick="ubahOffset('minggu', 1, event)"><i class="fas fa-chevron-right"></i></button>
            </div>
            <h2 id="pdptMinggu" onclick="bukaDetailPeriode('minggu')">Rp 0</h2>
          </div>

          <div class="stat-card" id="swipeBulan">
            <div class="card-nav">
              <button class="btn-arrow" onclick="ubahOffset('bulan', -1, event)"><i class="fas fa-chevron-left"></i></button>
              <h4 id="labelBulan" onclick="bukaDetailPeriode('bulan')">Bulan Ini</h4>
              <button class="btn-arrow" onclick="ubahOffset('bulan', 1, event)"><i class="fas fa-chevron-right"></i></button>
            </div>
            <h2 id="pdptBulan" onclick="bukaDetailPeriode('bulan')">Rp 0</h2>
          </div>

          <div class="stat-card" id="swipeTahun">
            <div class="card-nav">
              <button class="btn-arrow" onclick="ubahOffset('tahun', -1, event)"><i class="fas fa-chevron-left"></i></button>
              <h4 id="labelTahun" onclick="bukaDetailPeriode('tahun')">Tahun Ini</h4>
              <button class="btn-arrow" onclick="ubahOffset('tahun', 1, event)"><i class="fas fa-chevron-right"></i></button>
            </div>
            <h2 id="pdptTahun" onclick="bukaDetailPeriode('tahun')">Rp 0</h2>
          </div>
        </div>
        
        <div class="calendar-container glass">
          <div class="calendar-header">
              <button class="btn btn-batal" onclick="ubahBulanKalender(-1)" style="padding:5px 12px"><i class="fas fa-chevron-left"></i></button>
              <h3 id="judulBulanKalender">Memuat...</h3>
              <button class="btn btn-batal" onclick="ubahBulanKalender(1)" style="padding:5px 12px"><i class="fas fa-chevron-right"></i></button>
          </div>
          <div id="gridKalender" class="calendar-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="modalDetailPeriode" class="modal-overlay">
    <div class="modal-content glass" style="max-width: 450px;">
      <div class="modal-header"><i class="fas fa-list-alt" style="color:#2b6cb0;"></i> Rekap Kunjungan<span id="judulPeriodeDisp" style="font-size:13px; color:#4a5568; display:block; margin-top:5px; font-weight:normal;"></span></div>
      <div id="listPasienPeriode" style="max-height: 350px; overflow-y:auto; margin-bottom: 15px;"></div>
      <div style="display:flex; justify-content:space-between; align-items:center; border-top:2px dashed #e2e8f0; padding-top:15px;"><h4 style="margin:0; color:#2d3748; font-size:14px;">Total Biaya:</h4><h3 id="totalPeriodeDisp" style="margin:0; color:#2f855a; font-size:18px;"></h3></div>
      <div style="text-align:right; margin-top:20px;"><button class="btn btn-batal" onclick="tutupModal('modalDetailPeriode')">Tutup</button></div>
    </div>
  </div>

  <div id="modalTambah" class="modal-overlay">
    <div class="modal-content glass">
      <div class="modal-header"><i class="fas fa-user-plus" style="color:#2b6cb0;"></i> Input Pasien Baru</div>
      <form id="formTambahPasien" onsubmit="submitTambahPasien(event)">
        <div class="form-group"><label><i class="fas fa-venus-mars" style="color:#b794f4;"></i> Sapaan (Gelar)</label><div class="radio-group"><label><input type="radio" name="titlePasien" value="Tn. " checked> Tn.</label><label><input type="radio" name="titlePasien" value="Ny. "> Ny.</label><label><input type="radio" name="titlePasien" value="An. "> An.</label><label><input type="radio" name="titlePasien" value="Nn. "> Nn.</label><label><input type="radio" name="titlePasien" value=""> Kosong</label></div></div>
        <div class="form-group" style="margin-top: 15px;"><label><i class="fas fa-id-card" style="color:#b794f4;"></i> Nama Lengkap (Tanpa Sapaan)</label><input type="text" class="form-control" id="newNama" required placeholder="Contoh: Budi Santoso"></div>
        <div class="form-group" style="margin-top: 15px;"><label><i class="fas fa-map-marked-alt" style="color:#4fd1c5;"></i> Alamat Lengkap</label><textarea class="form-control" id="newAlamat" rows="2" required placeholder="Nama jalan, desa..."></textarea></div>
        <div class="grid-2"><div class="form-group"><label>RT</label><input type="number" class="form-control" id="newRT" required></div><div class="form-group"><label>RW</label><input type="number" class="form-control" id="newRW" required></div></div>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;"><button type="button" class="btn btn-batal" onclick="tutupModal('modalTambah')">Batal</button><button type="submit" class="btn btn-super" id="btnSavePasien"><i class="fas fa-save"></i> Simpan & Periksa</button></div>
      </form>
    </div>
  </div>

  <div id="modalEditPasien" class="modal-overlay">
    <div class="modal-content glass">
      <div class="modal-header"><i class="fas fa-user-edit" style="color:#ecc94b;"></i> Edit Biodata Pasien</div>
      <form id="formEditPasien" onsubmit="submitEditPasien(event)">
        <input type="hidden" id="editIdPasien">
        <div class="form-group"><label><i class="fas fa-venus-mars" style="color:#ecc94b;"></i> Pilih Sapaan (Gelar)</label><div class="radio-group"><label><input type="radio" name="editTitlePasien" value="Tn. "> Tn.</label><label><input type="radio" name="editTitlePasien" value="Ny. "> Ny.</label><label><input type="radio" name="editTitlePasien" value="An. "> An.</label><label><input type="radio" name="editTitlePasien" value="Nn. "> Nn.</label><label><input type="radio" name="editTitlePasien" value=""> Kosong</label></div></div>
        <div class="form-group" style="margin-top: 15px;"><label><i class="fas fa-id-card" style="color:#ecc94b;"></i> Nama Lengkap (Tanpa Sapaan)</label><input type="text" class="form-control" id="editNama" required></div>
        <div class="form-group"><label>Alamat</label><textarea class="form-control" id="editAlamat" rows="2" required></textarea></div>
        <div class="grid-2"><div class="form-group"><label>RT</label><input type="number" class="form-control" id="editRT" required></div><div class="form-group"><label>RW</label><input type="number" class="form-control" id="editRW" required></div></div>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;"><button type="button" class="btn btn-batal" onclick="tutupModal('modalEditPasien')">Batal</button><button type="submit" class="btn btn-edit" id="btnUpdatePasien"><i class="fas fa-save"></i> Update Biodata</button></div>
      </form>
    </div>
  </div>

  <div id="modalForm" class="modal-overlay">
    <div class="modal-content glass">
      <div class="modal-header"><i class="fas fa-stethoscope" style="color:#48bb78;"></i> Pemeriksaan: <span id="namaPasienDisp" style="margin-left:5px; color:#2b6cb0;"></span></div>
      <form id="formPemeriksaan" onsubmit="submitPemeriksaan(event)">
        <input type="hidden" id="idPasien">
        <div class="form-group"><label>Anamnesa / Keluhan</label><textarea id="anamnesa" class="form-control" rows="2" required></textarea></div>
        <div class="grid-2"><div class="form-group"><label>Tensi (TD)</label><input type="text" id="td" class="form-control" placeholder="120/80"></div><div class="form-group"><label>Suhu (°C)</label><input type="text" id="suhu" class="form-control"></div><div class="form-group"><label>Nadi</label><input type="text" id="nadi" class="form-control"></div><div class="form-group"><label>RR</label><input type="text" id="rr" class="form-control"></div></div>
        <div style="background: rgba(255,255,255,0.6); padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 10px;">
          <label style="font-weight:700; color:#2d3748; margin-bottom:8px; display:block;"><i class="fas fa-capsules" style="color:#48bb78;"></i> Resep Obat (6 Baris)</label>
          <div style="display: flex; flex-direction: column; gap: 8px;">
            <input type="text" id="obat1" class="form-control" placeholder="Obat 1"><input type="text" id="obat2" class="form-control" placeholder="Obat 2"><input type="text" id="obat3" class="form-control" placeholder="Obat 3"><input type="text" id="obat4" class="form-control" placeholder="Obat 4"><input type="text" id="obat5" class="form-control" placeholder="Obat 5"><input type="text" id="obat6" class="form-control" placeholder="Obat 6">
          </div>
        </div>
        <div class="form-group" style="margin-top: 15px;"><label>Total Biaya (Rp)</label><input type="text" id="biaya" class="form-control" required placeholder="Contoh: 50.000" oninput="formatRibuan(this)"></div>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;"><button type="button" class="btn btn-batal" onclick="tutupModal('modalForm')">Batal</button><button type="submit" class="btn btn-mulai" id="btnSimpanRM"><i class="fas fa-save"></i> Simpan Data</button></div>
      </form>
    </div>
  </div>

  <div id="modalEditRM" class="modal-overlay">
    <div class="modal-content glass">
      <div class="modal-header"><i class="fas fa-edit" style="color:#ecc94b;"></i> Edit Hasil Pemeriksaan</div>
      <form id="formEditRM" onsubmit="submitEditRM(event)">
        <input type="hidden" id="editRMRowIndex">
        <div class="form-group"><label>Anamnesa / Keluhan</label><textarea id="editAnamnesa" class="form-control" rows="2" required></textarea></div>
        <div class="grid-2"><div class="form-group"><label>Tensi</label><input type="text" id="editTd" class="form-control"></div><div class="form-group"><label>Suhu</label><input type="text" id="editSuhu" class="form-control"></div><div class="form-group"><label>Nadi</label><input type="text" id="editNadi" class="form-control"></div><div class="form-group"><label>RR</label><input type="text" id="editRr" class="form-control"></div></div>
        <div style="background: rgba(255,255,255,0.6); padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 10px;">
          <label style="font-weight:700; color:#2d3748; margin-bottom:8px; display:block;"><i class="fas fa-capsules" style="color:#48bb78;"></i> Resep Obat (6 Baris)</label>
          <div style="display: flex; flex-direction: column; gap: 8px;">
            <input type="text" id="editObat1" class="form-control"><input type="text" id="editObat2" class="form-control"><input type="text" id="editObat3" class="form-control"><input type="text" id="editObat4" class="form-control"><input type="text" id="editObat5" class="form-control"><input type="text" id="editObat6" class="form-control">
          </div>
        </div>
        <div class="form-group" style="margin-top: 15px;"><label>Total Biaya (Rp)</label><input type="text" id="editBiaya" class="form-control" required oninput="formatRibuan(this)"></div>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;"><button type="button" class="btn btn-batal" onclick="tutupModal('modalEditRM')">Batal</button><button type="submit" class="btn btn-edit" id="btnUpdateRM"><i class="fas fa-save"></i> Update Data RM</button></div>
      </form>
    </div>
  </div>

  <div id="modalRiwayat" class="modal-overlay">
    <div class="modal-content glass">
      <div class="modal-header"><i class="fas fa-history" style="color:#ed8936;"></i> Riwayat: <span id="namaRiwayat" style="margin-left:5px; color:#2b6cb0;"></span></div>
      <div id="loaderRiwayat" class="loader" style="display:block;"><i class="fas fa-spinner"></i></div>
      <div id="listRiwayat" style="max-height: 400px; overflow-y:auto; padding-right:5px;"></div>
      <div style="text-align:right; margin-top:15px;"><button class="btn btn-batal" onclick="tutupModal('modalRiwayat')">Tutup</button></div>
    </div>
  </div>

  <script>
    // ==============================================================================
    // WAJIB DIGANTI: Masukkan URL Web App Google Apps Script (berakhiran /exec) Anda
    // ==============================================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbzwafL-XIfqazsl1rufQamYU2Gvs4cHUjct5TC-xxnDBbZ63VoFAuRzsIUVQ6tjSM4uOA/exec"; 

    function runGoogleScript(action, data, onSuccess) {
      fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: action, data: data }) })
      .then(r => r.json()).then(res => { if(res.status === 'success') onSuccess(res.data); }).catch(e => console.error(e));
    }

    let semuaPasien = [], allTransactions = [];
    let riwayatPasienGlobal = [], currentPasienId = "", currentPasienNama = "";
    
    // State Navigasi Kartu Geser
    let offset = { hari: 0, minggu: 0, bulan: 0, tahun: 0 };
    let summaryFiltered = { hari: [], minggu: [], bulan: [], tahun: [] };
    let tanggalKalender = new Date();

    const liburNasional = { "01-01": "Tahun Baru", "05-01": "Hari Buruh", "06-01": "Pancasila", "08-17": "Kemerdekaan RI", "12-25": "Natal" };

    window.onload = () => { refreshData(); loadPendapatanBackground(); setupSwipeListeners(); };

    function formatRibuan(n) { return new Intl.NumberFormat('id-ID').format(n); }
    function formatRp(n) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(n); }
    function formatInputRibuan(input) { let v = input.value.replace(/[^,\d]/g, '').toString(); let s = v.split(','); let sisa = s[0].length % 3; let rp = s[0].substr(0, sisa); let rb = s[0].substr(sisa).match(/\d{3}/gi); if (rb) { let sep = sisa ? '.' : ''; rp += sep + rb.join('.'); } rp = s[1] != undefined ? rp + ',' + s[1] : rp; input.value = rp; }

    function switchTab(tabId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active'); event.currentTarget.classList.add('active');
    }

    function bukaModal(id) { document.getElementById(id).style.display = 'flex'; }
    function tutupModal(id) { document.getElementById(id).style.display = 'none'; }

    // --- LOGIKA MESIN WAKTU (GESER & KLIK) ---
    function loadPendapatanBackground() {
      runGoogleScript('getDataPendapatanFull', null, data => {
        allTransactions = data; document.getElementById('loaderPendapatan').style.display = 'none'; document.getElementById('kontenPendapatan').style.display = 'block'; updateDashboards();
      });
    }
    
    function loadPendapatanManual() {
      document.getElementById('kontenPendapatan').style.display = 'none'; document.getElementById('loaderPendapatan').style.display = 'block';
      loadPendapatanBackground();
    }

    function ubahOffset(tipe, arah, event) {
      if(event) event.stopPropagation(); // Cegah modal terbuka saat klik panah
      offset[tipe] += arah; updateDashboards();
    }

    function setupSwipeListeners() {
      ['hari', 'minggu', 'bulan', 'tahun'].forEach(tipe => {
        let el = document.getElementById('swipe' + tipe.charAt(0).toUpperCase() + tipe.slice(1));
        if(!el) return; let touchstartX = 0; let touchendX = 0;
        el.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, {passive: true});
        el.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            if (touchendX > touchstartX + 40) ubahOffset(tipe, -1); // Geser Kanan (Masa Lalu)
            else if (touchendX < touchstartX - 40) ubahOffset(tipe, 1); // Geser Kiri (Masa Depan)
        }, {passive: true});
      });
    }

    function updateDashboards() {
      summaryFiltered = { hari: [], minggu: [], bulan: [], tahun: [] };
      let dataKalender = {}; const now = new Date();

      // Hitungan Batas Waktu
      let targetHari = new Date(); targetHari.setDate(now.getDate() + offset.hari);
      let tHariStr = targetHari.toDateString();

      let targetMinggu = new Date(); targetMinggu.setDate(now.getDate() + (offset.minggu * 7));
      let day = targetMinggu.getDay(), diff = targetMinggu.getDate() - day + (day == 0 ? -6:1);
      let mon = new Date(targetMinggu.setDate(diff)); mon.setHours(0,0,0,0);
      let sun = new Date(new Date(mon).setDate(mon.getDate() + 6)); sun.setHours(23,59,59,999);

      let targetBulan = new Date(); targetBulan.setMonth(now.getMonth() + offset.bulan);
      let bBln = targetBulan.getMonth(), bThn = targetBulan.getFullYear();

      let targetTahun = new Date(); targetTahun.setFullYear(now.getFullYear() + offset.tahun);
      let tThn = targetTahun.getFullYear();

      allTransactions.forEach(r => {
        let tgl = new Date(r.tglStr);
        let info = { nama: r.nama, biaya: r.biaya, tglString: tgl.toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'}) };

        if (tgl.toDateString() === tHariStr) summaryFiltered.hari.push(info);
        if (tgl >= mon && tgl <= sun) summaryFiltered.minggu.push(info);
        if (tgl.getMonth() === bBln && tgl.getFullYear() === bThn) {
          summaryFiltered.bulan.push(info);
          if (offset.bulan === 0) {
            let key = `${tgl.getFullYear()}-${String(tgl.getMonth()+1).padStart(2,'0')}-${String(tgl.getDate()).padStart(2,'0')}`;
            if (!dataKalender[key]) dataKalender[key] = { totalBiaya: 0, jumlahKunjungan: 0, pasien: [] };
            dataKalender[key].totalBiaya += r.biaya; dataKalender[key].jumlahKunjungan += 1; dataKalender[key].pasien.push(info);
          }
        }
        if (tgl.getFullYear() === tThn) summaryFiltered.tahun.push(info);
      });

      // Update UI Teks
      document.getElementById('labelHari').innerText = offset.hari === 0 ? "HARI INI" : targetHari.toLocaleDateString('id-ID', {day:'numeric', month:'short'});
      document.getElementById('pdptHari').innerText = formatRp(summaryFiltered.hari.reduce((a,b) => a+b.biaya, 0));

      document.getElementById('labelMinggu').innerText = offset.minggu === 0 ? "MINGGU INI" : `${mon.getDate()} - ${sun.getDate()} ${sun.toLocaleDateString('id-ID',{month:'short'})}`;
      document.getElementById('pdptMinggu').innerText = formatRp(summaryFiltered.minggu.reduce((a,b) => a+b.biaya, 0));

      const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
      document.getElementById('labelBulan').innerText = offset.bulan === 0 ? "BULAN INI" : `${monthNames[bBln]} ${bThn}`;
      document.getElementById('pdptBulan').innerText = formatRp(summaryFiltered.bulan.reduce((a,b) => a+b.biaya, 0));

      document.getElementById('labelTahun').innerText = offset.tahun === 0 ? "TAHUN INI" : `TAHUN ${tThn}`;
      document.getElementById('pdptTahun').innerText = formatRp(summaryFiltered.tahun.reduce((a,b) => a+b.biaya, 0));

      if(offset.bulan === 0) renderKalender(dataKalender);
    }

    function bukaDetailPeriode(tipe) {
      const list = summaryFiltered[tipe]; const total = list.reduce((a,b) => a + b.biaya, 0);
      document.getElementById('judulPeriodeDisp').innerText = document.getElementById('label'+tipe.charAt(0).toUpperCase() + tipe.slice(1)).innerText;
      let h = '';
      if(list.length === 0) h = '<p style="text-align:center; color:#718096; font-size:13px; margin:20px 0;">Belum ada kunjungan.</p>';
      else list.forEach((p, i) => h += `<div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px dashed #e2e8f0;"><div style="display:flex; flex-direction:column;"><div style="display:flex; align-items:center; gap:8px;"><span style="font-size:10px; color:#fff; background:#a0aec0; padding:2px 6px; border-radius:5px;">${i+1}</span><span style="font-size:13px; font-weight:600; color:#2d3748;">${p.nama}</span></div><span style="font-size:10px; color:#718096; margin-left:28px; margin-top:2px;">${p.tglString}</span></div><span style="font-size:11px; color:#2f855a; font-weight:700; background:rgba(47,133,90,0.1); padding:4px 8px; border-radius:6px;">Rp ${formatRibuan(p.biaya)}</span></div>`);
      document.getElementById('listPasienPeriode').innerHTML = h; document.getElementById('totalPeriodeDisp').innerText = formatRp(total); bukaModal('modalDetailPeriode');
    }

    // --- KALENDER ---
    function ubahBulanKalender(arah) {
      tanggalKalender.setMonth(tanggalKalender.getMonth() + arah);
      let dataKalender = {}; let bBln = tanggalKalender.getMonth(), bThn = tanggalKalender.getFullYear();
      allTransactions.forEach(r => {
        let tgl = new Date(r.tglStr);
        if (tgl.getMonth() === bBln && tgl.getFullYear() === bThn) {
          let key = `${tgl.getFullYear()}-${String(tgl.getMonth()+1).padStart(2,'0')}-${String(tgl.getDate()).padStart(2,'0')}`;
          if (!dataKalender[key]) dataKalender[key] = { totalBiaya: 0, jumlahKunjungan: 0, pasien: [] };
          dataKalender[key].totalBiaya += r.biaya; dataKalender[key].jumlahKunjungan += 1; dataKalender[key].pasien.push({ nama: r.nama, biaya: r.biaya, tglString: tgl.toLocaleDateString('id-ID') });
        }
      });
      renderKalender(dataKalender);
    }

    function renderKalender(dataKalender) {
      const y = tanggalKalender.getFullYear(), m = tanggalKalender.getMonth(), now = new Date();
      document.getElementById('judulBulanKalender').innerText = `${["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"][m]} ${y}`;
      const first = new Date(y, m, 1).getDay(), total = new Date(y, m + 1, 0).getDate(), grid = document.getElementById('gridKalender');
      grid.innerHTML = ''; ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'].forEach((d, i) => grid.innerHTML += `<div class="cal-day-name ${i===0?'text-red':''}">${d}</div>`);
      for (let i = 0; i < first; i++) grid.innerHTML += `<div class="cal-day empty"></div>`;
      for (let i = 1; i <= total; i++) {
        let key = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`; let isToday = (i === now.getDate() && m === now.getMonth() && y === now.getFullYear()) ? 'today' : '';
        let libur = liburNasional[key.substring(5)]; let dH = dataKalender[key];
        let h = `<div class="cal-day ${isToday} ${dH?'has-data':''}" ${dH?`onclick="bukaDetailKunjungan('${key}', '${JSON.stringify(dH.pasien).replace(/"/g, '&quot;')}', ${dH.totalBiaya})"`:''}><div class="date-num ${(new Date(y,m,i).getDay()===0 || libur)?'text-red':''}">${i}</div>`;
        if(libur) h += `<div class="holiday-tag">${libur}</div>`;
        if(dH) h += `<div class="visit-badge">${dH.jumlahKunjungan} Ps</div><div class="income-tag">Rp ${formatRibuan(dH.totalBiaya)}</div><div class="logo-rp-emas">Rp</div>`;
        grid.innerHTML += h + `</div>`;
      }
    }

    function bukaDetailKunjungan(tgl, json, total) {
      const list = JSON.parse(json); document.getElementById('tglDetailDisp').innerText = new Date(tgl).toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      let h = ''; list.forEach((p, i) => h += `<div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px dashed #e2e8f0;"><div style="display:flex; align-items:center; gap:10px;"><span style="font-size:10px; color:#fff; background:#a0aec0; padding:2px 6px; border-radius:5px;">${i+1}</span><span style="font-size:13px; font-weight:600; color:#2d3748;">${p.nama}</span></div><span style="font-size:11px; color:#2f855a; font-weight:700; background:rgba(47,133,90,0.1); padding:4px 8px; border-radius:6px;">Rp ${formatRibuan(p.biaya)}</span></div>`);
      document.getElementById('listPasienKunjungan').innerHTML = h; document.getElementById('totalDetailDisp').innerText = formatRp(total); bukaModal('modalDetailKunjungan');
    }

    // --- CRUD PASIEN & RM ---
    function refreshData() { document.getElementById('loaderData').style.display = 'block'; runGoogleScript('getDataPasien', null, data => { semuaPasien = data; document.getElementById('loaderData').style.display = 'none'; renderPasien(semuaPasien); }); }
    function renderPasien(data) { const list = document.getElementById('patientList'); list.innerHTML = ''; data.forEach(p => { list.innerHTML += `<div class="glass patient-card"><div class="patient-info"><h3><i class="fas fa-user-circle" style="color:#b794f4;"></i> ${p.nama}</h3><p><i class="fas fa-map-marker-alt" style="color:#e53e3e;"></i> ${p.alamat}, RT ${p.rt}/RW ${p.rw}</p></div><div class="btn-group"><button class="btn btn-edit" onclick="bukaEditPasien('${p.id}', '${p.nama}', '${p.alamat}', '${p.rt}', '${p.rw}')"><i class="fas fa-edit"></i> Edit</button><button class="btn btn-riwayat" onclick="bukaRiwayat('${p.id}', '${p.nama}')"><i class="fas fa-history"></i> Riwayat</button><button class="btn btn-mulai" onclick="bukaFormPemeriksaan('${p.id}', '${p.nama}')"><i class="fas fa-stethoscope"></i> Periksa</button></div></div>`; }); }
    function filterPasien() { const val = document.getElementById('searchInput').value.toLowerCase(); renderPasien(semuaPasien.filter(p => (p.nama + p.alamat).toLowerCase().includes(val))); }
    function submitTambahPasien(e) { e.preventDefault(); const t = document.querySelector('input[name="titlePasien"]:checked').value, data = { nama: t + document.getElementById('newNama').value, alamat: document.getElementById('newAlamat').value, rt: document.getElementById('newRT').value, rw: document.getElementById('newRW').value }; runGoogleScript('simpanPasienBaru', data, res => { tutupModal('modalTambah'); document.getElementById('formTambahPasien').reset(); refreshData(); bukaFormPemeriksaan(res.id, res.nama); }); }
    function bukaEditPasien(id, nF, al, rt, rw) { document.getElementById('editIdPasien').value = id; let sD = "", nA = nF; for (let s of ["Tn. ", "Ny. ", "An. ", "Nn. "]) { if (nF.startsWith(s)) { sD = s; nA = nF.substring(s.length); break; } } const r = document.getElementsByName('editTitlePasien'); for (let i=0; i<r.length; i++) if (r[i].value === sD) r[i].checked = true; document.getElementById('editNama').value = nA; document.getElementById('editAlamat').value = al; document.getElementById('editRT').value = rt; document.getElementById('editRW').value = rw; bukaModal('modalEditPasien'); }
    function submitEditPasien(e) { e.preventDefault(); const t = document.querySelector('input[name="editTitlePasien"]:checked').value, data = { id: document.getElementById('editIdPasien').value, nama: t + document.getElementById('editNama').value, alamat: document.getElementById('editAlamat').value, rt: document.getElementById('editRT').value, rw: document.getElementById('editRW').value }; runGoogleScript('updateBiodataPasien', data, () => { tutupModal('modalEditPasien'); refreshData(); }); }
    function bukaFormPemeriksaan(id, n) { document.getElementById('idPasien').value = id; document.getElementById('namaPasienDisp').innerText = n; document.getElementById('formPemeriksaan').reset(); bukaModal('modalForm'); }
    function submitPemeriksaan(e) { e.preventDefault(); const d = { idPasien: document.getElementById('idPasien').value, namaPasien: document.getElementById('namaPasienDisp').innerText, anamnesa: document.getElementById('anamnesa').value, td: document.getElementById('td').value, suhu: document.getElementById('suhu').value, nadi: document.getElementById('nadi').value, rr: document.getElementById('rr').value, obat1: document.getElementById('obat1').value, obat2: document.getElementById('obat2').value, obat3: document.getElementById('obat3').value, obat4: document.getElementById('obat4').value, obat5: document.getElementById('obat5').value, obat6: document.getElementById('obat6').value, biaya: document.getElementById('biaya').value.replace(/\./g, '') }; runGoogleScript('simpanPemeriksaan', d, () => { tutupModal('modalForm'); loadPendapatanBackground(); }); }
    function bukaRiwayat(id, n) { currentPasienId = id; currentPasienNama = n; document.getElementById('namaRiwayat').innerText = n; bukaModal('modalRiwayat'); document.getElementById('loaderRiwayat').style.display = 'block'; document.getElementById('listRiwayat').innerHTML = ''; runGoogleScript('getRiwayatPasien', {idPasien: id}, data => { riwayatPasienGlobal = data; document.getElementById('loaderRiwayat').style.display = 'none'; let h = ''; data.forEach((r, idx) => { h += `<div style="background:rgba(255,255,255,0.7); padding:15px; border-radius:12px; margin-bottom:10px;"><div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span style="font-size:12px; font-weight:700; color:#2b6cb0;">${r.tanggal}</span><button class="btn btn-edit" style="padding:4px 10px" onclick="bukaEditRM(${idx})">Edit</button></div><p style="font-size:13px; font-weight:600;">Keluhan: ${r.anamnesa}</p><p style="font-size:12px; color:#4a5568;">Obat: ${r.obat}</p></div>`; }); document.getElementById('listRiwayat').innerHTML = h; }); }
    function bukaEditRM(idx) { const d = riwayatPasienGlobal[idx]; document.getElementById('editRMRowIndex').value = d.rowIndex; document.getElementById('editAnamnesa').value = d.anamnesa; document.getElementById('editTd').value = d.td; document.getElementById('editSuhu').value = d.suhu; document.getElementById('editNadi').value = d.nadi; document.getElementById('editRr').value = d.rr; document.getElementById('editObat1').value = d.obat1||""; document.getElementById('editObat2').value = d.obat2||""; document.getElementById('editObat3').value = d.obat3||""; document.getElementById('editObat4').value = d.obat4||""; document.getElementById('editObat5').value = d.obat5||""; document.getElementById('editObat6').value = d.obat6||""; document.getElementById('editBiaya').value = d.biaya; formatInputRibuan(document.getElementById('editBiaya')); bukaModal('modalEditRM'); }
    function submitEditRM(e) { e.preventDefault(); const d = { rowIndex: document.getElementById('editRMRowIndex').value, anamnesa: document.getElementById('editAnamnesa').value, td: document.getElementById('editTd').value, suhu: document.getElementById('editSuhu').value, nadi: document.getElementById('editNadi').value, rr: document.getElementById('editRr').value, obat1: document.getElementById('editObat1').value, obat2: document.getElementById('editObat2').value, obat3: document.getElementById('editObat3').value, obat4: document.getElementById('editObat4').value, obat5: document.getElementById('editObat5').value, obat6: document.getElementById('editObat6').value, biaya: document.getElementById('editBiaya').value.replace(/\./g, '') }; runGoogleScript('updateRekamMedis', d, () => { tutupModal('modalEditRM'); loadPendapatanBackground(); bukaRiwayat(currentPasienId, currentPasienNama); }); }
  </script>
</body>
</html>
